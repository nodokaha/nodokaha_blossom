name: Symfony CI
on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  symfony:
    name: Symfony (PHP ${{ matrix.php-versions }})
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      APP_DEBUG: 0

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: false
          MYSQL_ROOT_PASSWORD: symfony
          MYSQL_DATABASE: app_test
          MYSQL_USER: app
          MYSQL_PASSWORD: app
        ports:
          - 3306/tcp
        options: >
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        php-versions: ['8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, pdo_sqlite
          coverage: xdebug

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Prepare test database
        run: |
          php bin/console doctrine:database:create --if-not-exists --env=test --no-interaction
          php bin/console doctrine:database:create --if-not-exists --env=test --no-interaction
          php bin/console doctrine:schema:create --env=test --no-interaction
          php bin/console doctrine:fixtures:load --env=test --no-interaction
        env:
          DATABASE_URL: mysql://app:app@127.0.0.1:${{ job.services.mysql.ports['3306'] }}/app_test?serverVersion=8.4&charset=utf8mb4

      - name: Run PHPUnit
        run: php bin/phpunit --configuration phpunit.dist.xml --coverage-text
        env:
          DATABASE_URL: mysql://app:app@127.0.0.1:${{ job.services.mysql.ports['3306'] }}/app_test?serverVersion=8.4&charset=utf8mb4

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse -c phpstan.neon

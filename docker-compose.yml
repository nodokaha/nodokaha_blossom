services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      APP_ENV: dev
      APP_SECRET: ${APP_SECRET:-change-me}
      DATABASE_URL: mysql://app:app@db:3306/app?serverVersion=8.4&charset=utf8mb4
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.1
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: app
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -papp --silent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
